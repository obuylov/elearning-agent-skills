# ============================================================
# Примеры заполненных assessment-блоков (по модели course-model)
# ============================================================

# --- single_choice ---
- id: f4a5b6c
  type: assessment
  block: single_choice
  status: filled
  purpose: "Проверка: сможет ли сотрудник определить тип угрозы"
  content_basis: brief
  question: "Сотрудник получил письмо с просьбой срочно перейти по ссылке и ввести пароль. Какой это тип угрозы?"
  options:
    - text: "Фишинг"
      correct: true
      feedback: "Верно. Это классический пример фишинга — попытка получить данные через поддельное письмо."
    - text: "DDoS-атака"
      correct: false
      feedback: "Нет. DDoS — это перегрузка сервера запросами, а не попытка получить ваши данные."
    - text: "Вирус-шифровальщик"
      correct: false
      feedback: "Нет. Шифровальщик блокирует файлы и требует выкуп. Здесь речь о краже пароля."
    - text: "Инсайдерская угроза"
      correct: false
      feedback: "Нет. Инсайдерская угроза исходит от сотрудника компании, а не из внешнего письма."
  explanation: "Фишинг — одна из самых распространённых угроз. Главный признак: просьба срочно ввести личные данные."

# --- multiple_choice ---
- id: d7e8f9a
  type: assessment
  block: multiple_choice
  status: filled
  purpose: "Проверка: какие из мер защиты являются обязательными"
  content_basis: brief
  question: "Какие из перечисленных мер обязательны при работе с конфиденциальными данными?"
  instruction: "Выберите все правильные варианты"
  options:
    - text: "Блокировка компьютера при уходе с рабочего места"
      correct: true
    - text: "Использование личной почты для пересылки документов"
      correct: false
    - text: "Шифрование файлов перед отправкой"
      correct: true
    - text: "Хранение паролей в текстовом файле на рабочем столе"
      correct: false
  explanation: "Блокировка экрана и шифрование — обязательные меры."

# --- matching ---
- id: d6e7f8a
  type: assessment
  block: matching
  status: filled
  purpose: "Сопоставление типов угроз с примерами"
  content_basis: brief
  instruction: "Сопоставьте тип угрозы с примером из рабочей практики"
  pairs:
    - item: "Фишинг"
      match: "Письмо от «банка» с просьбой подтвердить реквизиты"
    - item: "Социальная инженерия"
      match: "Звонок от «техподдержки» с просьбой назвать пароль"
    - item: "Вирус-шифровальщик"
      match: "Файлы заблокированы, на экране — требование выкупа"
  feedback_correct: "Отлично! Вы правильно определили все типы угроз."
  feedback_incorrect: "Не совсем. Обратите внимание на ключевые признаки каждого типа."

# --- sorting ---
- id: a1b2c3d
  type: assessment
  block: sorting
  status: filled
  purpose: "Расставить шаги реагирования на инцидент в правильном порядке"
  content_basis: brief
  instruction: "Расположите шаги в правильном порядке"
  items:
    - "Зафиксировать инцидент"
    - "Отключить заражённое устройство от сети"
    - "Сообщить в службу ИБ"
    - "Дождаться инструкций"
  feedback_correct: "Верно!"
  feedback_incorrect: "Первый шаг — зафиксировать, затем изолировать угрозу."

# --- scenario ---
- id: e5f6a7b
  type: assessment
  block: scenario
  status: filled
  purpose: "Принятие решения в ситуации с подозрительным письмом"
  content_basis: brief
  context: "Вы получили письмо от support@cornpany.com (обратите внимание на домен) с просьбой срочно обновить пароль корпоративной почты."
  question: "Что вы сделаете в первую очередь?"
  options:
    - text: "Перейду по ссылке и обновлю пароль"
      correct: false
      feedback: "Это может быть фишинг. Домен содержит опечатку: cornpany вместо company."
    - text: "Проверю адрес отправителя и URL ссылки"
      correct: true
      feedback: "Верно! Первое действие — проверка отправителя и ссылок."
    - text: "Перешлю письмо коллегам для проверки"
      correct: false
      feedback: "Пересылка фишинга увеличивает зону риска."
    - text: "Удалю письмо без проверки"
      correct: false
      feedback: "Лучше проверить и сообщить в IT, чтобы защитить коллег."
  explanation: "При подозрительном письме: проверьте отправителя и ссылки, не кликая. Затем сообщите в IT."

# --- classify ---
- id: b8c9d0e
  type: assessment
  block: classify
  status: filled
  purpose: "Распределить действия на безопасные и небезопасные"
  content_basis: brief
  instruction: "Распределите действия по категориям"
  categories:
    - name: "Безопасно"
      items:
        - "Заблокировать экран перед уходом"
        - "Использовать менеджер паролей"
    - name: "Небезопасно"
      items:
        - "Записать пароль на стикере"
        - "Переслать документ через личную почту"
  feedback_correct: "Правильно!"
  feedback_incorrect: "Пересмотрите правила работы с паролями и данными."

# --- fill_gap ---
- id: c9d0e1f
  type: assessment
  block: fill_gap
  status: filled
  purpose: "Проверка знания минимальной длины пароля по политике"
  content_basis: source
  text_with_blanks: "Согласно политике ИБ компании, минимальная длина пароля составляет {{1}} символов."
  blanks:
    - id: "1"
      correct_answers:
        - "12"
        - "двенадцать"
      feedback: "По политике ИБ минимальная длина пароля — 12 символов."

# --- reflection ---
- id: d0e1f2a
  type: assessment
  block: reflection
  status: filled
  purpose: "Осмысление: как применить знания на практике"
  content_basis: generate
  prompt: "Вспомните последний случай, когда вы получили подозрительное письмо. Как вы отреагировали? Что бы сделали иначе после этого урока?"
  guidance: "Подумайте о трёх шагах проверки, которые мы разобрали."
