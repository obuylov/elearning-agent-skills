            block: tinymce
            status: empty
            purpose: "Контекст: почему важно знать угрозы"
            content_basis: brief
            content: ""

      # --- Теория: типы угроз ---
      - id: d4e5f6a
        role: concept
        completion: open_all_items
        blocks:
          - id: e5f6a7b
            type: presentation
            block: tinymce
            status: empty
            purpose: "Обзор: три основные категории угроз"
            source_ref: "sources/converted/policy.md#угрозы"
            content_basis: source
            content: ""

          - id: f6a7b8c
            type: presentation
            block: accordion
            status: empty
            purpose: "Детальное раскрытие каждой категории угрозы"
            source_ref: "sources/converted/policy.md#угрозы"
