                  type: presentation
                  block: tinymce
                  status: empty
                  purpose: "Пояснение: как проверить адрес отправителя"
                  content_basis: brief
                  content: ""
            - id: d6e7f8a
              role: example
              completion: read
              blocks:
                - id: e7f8a9b
                  type: presentation
                  block: tinymce
                  status: empty
                  purpose: "Пояснение: как проверить URL ссылки"
                  content_basis: brief
                  content: ""

      # --- Связка перед проверкой ---
      - id: f8a9b0c
