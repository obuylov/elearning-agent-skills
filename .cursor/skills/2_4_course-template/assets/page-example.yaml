                  - type: presentation
                    block: tinymce
                    content: ""
              - id: c9d0e1f
                title: ""
                blocks:
                  - type: presentation
                    block: tinymce
                    content: ""

      # --- Пример: walkthrough (вложенная горизонтальная сцена) ---
      - id: d0e1f2a
        role: example
        completion: click_continue
        blocks:
          - id: e1f2a3b
            type: presentation
            block: tinymce
            status: empty
            purpose: "Вводный текст: разберём на примере фишинговое письмо"
            content_basis: brief
            content: ""
