# ============================================================
# Аудитория: Руководители и менеджеры
# ============================================================

definition:
  name: Руководители и менеджеры
  slug: managers
  summary: >-
    Управленцы среднего и высшего звена: тимлиды, менеджеры,
    директора подразделений, топ-менеджмент. Принимают решения,
    управляют людьми и процессами. Ценят своё время.
  characteristics:
    - Высокая занятость — каждая минута на счету
    - Системное мышление, видят контекст
    - Ожидают уважения к статусу и опыту
    - Фокус на принятие решений и влияние на команду
    - Не терпят базовые вещи, которые «и так знают»
  typical_roles:
    - Руководители отделов
    - Тимлиды
    - Директора направлений
    - Проектные менеджеры
    - Топ-менеджмент

# ============================================================
# Вопросы для уточнения (WHO-фокус)
# ============================================================
clarification_questions:
  - question: Какого уровня руководители — линейные, средние, топ?
    approach: "линейные / средние / топ — влияет на глубину и тон"
  - question: Они уже знакомы с темой или это для них новое?
    approach: "знакомы / частично / новое"
  - question: Им нужно самим делать или обеспечить, чтобы делала команда?
    approach: "Влияет на фокус: навык vs. управление внедрением"
  - question: Есть ли специфические управленческие задачи в рамках темы?
    approach: "Пример: контролировать выполнение, мотивировать команду, принимать решения"

# ============================================================
# Шаблон секции brief.md (аудитория)
# ============================================================
brief_template:
  target_audience: managers
  audience_profile: "[Уровень руководства]"
  audience_size: "[Примерное количество]"
  management_level: "[линейные / средние / топ]"
  familiarity_with_topic: "[знакомы / частично / новое]"
  their_role_in_topic: "[исполнитель / контролёр / спонсор]"

# ============================================================
# Рекомендации по дизайну для этой аудитории
# ============================================================
design_adaptations:
  language:
    - Деловой, уверенный тон — без поучений
    - Бизнес-терминология допустима и ожидаема
    - Акцент на «почему это важно для вашей зоны ответственности»
  structure:
    - Компактные страницы — respect the clock
    - Кейсы и ситуации принятия решений
    - «Ваша роль» — что они должны обеспечить / контролировать
  assessment:
    - Сценарные вопросы и кейсы (scenario, case_question)
    - Вопросы на принятие решений, а не на запоминание фактов
    - Reflection-блоки для связи с собственной практикой
  tone:
    - Формально-деловой или нейтрально-деловой
    - Партнёрская позиция — «мы вместе решаем», а не «мы вас учим»
    - Обращение на «вы»
