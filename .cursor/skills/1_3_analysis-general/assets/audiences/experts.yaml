# ============================================================
# Аудитория: Эксперты и специалисты
# ============================================================

definition:
  name: Эксперты и специалисты
  slug: experts
  summary: >-
    Узкопрофильные специалисты с глубокой экспертизой в предметной области.
    Высокий уровень знаний, техническая грамотность. Курс должен
    добавлять ценность, а не пересказывать то, что они и так знают.
  characteristics:
    - Высокий уровень базовых знаний — не нужно «начинать с нуля»
    - Критичны к неточностям и упрощениям
    - Ценят глубину и нюансы
    - Могут скептически относиться к обучению — «зачем мне это»
    - Техническая терминология — норма, а не барьер
  typical_roles:
    - IT-специалисты (разработчики, DevOps, архитекторы)
    - Инженеры
    - Финансовые аналитики
    - Юристы
    - Врачи и медицинские специалисты
    - Узкие предметные эксперты

# ============================================================
# Вопросы для уточнения (WHO-фокус)
# ============================================================
clarification_questions:
  - question: Какой уровень экспертизы у аудитории в теме курса?
    approach: "средний / высокий / смешанный"
  - question: Что именно для них новое в этом курсе?
    approach: "Определяет, где фокус: обновление / углубление / переосмысление"
  - question: Есть ли риск, что часть контента будет для них очевидной?
    approach: "да/нет — влияет на уровень детализации"
  - question: Как они обычно учатся — предпочитают текст, видео, практику?
    approach: "Влияет на выбор блоков"

# ============================================================
# Шаблон секции brief.md (аудитория)
# ============================================================
brief_template:
  target_audience: experts
  audience_profile: "[Специализация]"
  audience_size: "[Примерное количество]"
  expertise_level: "[средний / высокий / смешанный]"
  whats_new_for_them: "[Что нового в этом курсе для них]"
  learning_preferences: "[текст / видео / практика / кейсы]"

# ============================================================
# Рекомендации по дизайну для этой аудитории
# ============================================================
design_adaptations:
  language:
    - Профессиональная терминология допустима и ожидаема
    - Минимум «воды» — каждое предложение должно нести ценность
    - Ссылки на источники, стандарты, исследования повышают доверие
  structure:
    - Можно пропускать базу — сразу к сути
    - Развёрнутые блоки с глубоким разбором (accordion с деталями)
    - Кейсы и примеры из реальной практики, а не «учебные»
    - Tabs для сравнения подходов / методов / решений
  assessment:
    - Сложные сценарные вопросы (scenario, case_question)
    - Вопросы на анализ и принятие решений, а не на факты
    - Reflection-блоки для осмысления и связи с опытом
    - Можно обойтись без пороговых баллов — мотивация внутренняя
  tone:
    - Уважительный, на равных — коллега-коллеге
    - Обращение на «вы»
    - Избегать покровительственных формулировок
    - Честно про ограничения: «Тема спорная, вот две позиции»
