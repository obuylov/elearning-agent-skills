# ============================================================
# Аудитория: Новые сотрудники
# ============================================================

definition:
  name: Новые сотрудники
  slug: newcomers
  summary: >-
    Люди, которые только вошли в компанию, роль или функцию.
    Период адаптации: первые 30/60/90 дней. Не знают контекста,
    культуры, внутренних процессов. Нужен «фундамент».
  characteristics:
    - Нет внутреннего контекста — не знают «как тут принято»
    - Высокая мотивация, но информационная перегрузка
    - Нужна навигация — «куда идти, кого спросить»
    - Тревожность первых дней — нужен поддерживающий тон
    - Не отличают важное от второстепенного
  typical_roles:
    - Новые сотрудники (0–90 дней)
    - Сотрудники после перевода на новую позицию
    - Стажёры и практиканты
    - Вернувшиеся после длительного отсутствия

# ============================================================
# Вопросы для уточнения (WHO-фокус)
# ============================================================
clarification_questions:
  - question: Это новички совсем «с нуля» или переводы внутри компании?
    approach: "с нуля / перевод — влияет на объём контекста"
  - question: Какой у них профессиональный бэкграунд до прихода?
    approach: "Влияет на уровень базовых знаний"
  - question: На каком этапе адаптации они проходят этот курс?
    approach: "первая неделя / первый месяц / первые 3 месяца"
  - question: Есть ли наставник / buddy, или курс — единственный источник?
    approach: "да/нет — влияет на полноту курса"

# ============================================================
# Шаблон секции brief.md (аудитория)
# ============================================================
brief_template:
  target_audience: newcomers
  audience_profile: "[Кто приходит: выпускники / опытные / переводы]"
  audience_size: "[Примерное количество новичков в месяц/год]"
  onboarding_stage: "[первая неделя / первый месяц / 3 месяца]"
  prior_experience: "[Типичный бэкграунд]"
  support_system: "[Есть наставник / buddy / ничего]"

# ============================================================
# Рекомендации по дизайну для этой аудитории
# ============================================================
design_adaptations:
  language:
    - Дружелюбный, поддерживающий тон — «добро пожаловать»
    - Объяснять внутренний жаргон и аббревиатуры
    - Давать контекст: «Зачем вам это знать», «К кому обращаться»
  structure:
    - Начинать с большой картины, потом детали
    - Карты, схемы, визуальные навигаторы
    - Чек-листы и «шпаргалки» для первых дней
    - Hotspot-блоки для ориентирования (карта офиса, структура компании)
  assessment:
    - Мягкая проверка — matching, classify (не экзамен)
    - Reflection-блоки: «Что вас больше всего удивило?»
    - Практические задания: «Попробуйте найти X в системе»
  tone:
    - Тёплый, без давления
    - «Ты» допустимо, если культура компании позволяет
    - «Не стесняйтесь спрашивать» — нормализация незнания
