# ============================================================
# Аудитория: Линейные сотрудники (массовая аудитория)
# ============================================================

definition:
  name: Линейные сотрудники
  slug: frontline
  summary: >-
    Массовая аудитория: операционный персонал, рядовые специалисты,
    офисные работники, сотрудники розницы, производства, склада, call-центра.
    Курс проходят десятки или сотни человек одновременно.
  characteristics:
    - Разнородный уровень подготовки — от стажёров до опытных
    - Ограниченное время на обучение (между задачами)
    - Практическая ориентация — «покажите, как делать»
    - Могут проходить на мобильных устройствах
    - Низкая терпимость к абстракциям и «воде»
  typical_roles:
    - Операторы
    - Продавцы-консультанты
    - Специалисты поддержки
    - Офисные сотрудники
    - Производственный персонал

# ============================================================
# Вопросы для уточнения (WHO-фокус)
# ============================================================
clarification_questions:
  - question: Сколько примерно человек будут проходить курс?
    approach: "10 / 50 / 100 / 500+ — предложи вариант"
  - question: Где они обычно работают — в офисе, на производстве, в поездках?
    approach: "Влияет на формат: мобильный / десктоп"
  - question: Есть ли у них выделенное время на обучение или проходят «между делом»?
    approach: "да/нет — влияет на длину сессий"
  - question: Какой средний стаж в этой роли?
    approach: "до 1 года / 1–3 года / 3+ лет"

# ============================================================
# Шаблон секции brief.md (аудитория)
# ============================================================
brief_template:
  target_audience: frontline
  audience_profile: "[Должности / роли]"
  audience_size: "[Примерное количество]"
  experience_level: "[Средний стаж / уровень]"
  work_context: "[Где работают, какие устройства]"
  learning_time: "[Выделенное время или между задачами]"

# ============================================================
# Рекомендации по дизайну для этой аудитории
# ============================================================
design_adaptations:
  language:
    - Простой язык, короткие предложения
    - Минимум терминов — если термин нужен, сразу объясняй
    - Конкретные примеры из их рабочей практики
  structure:
    - Короткие страницы (3–5 минут)
    - Практика и примеры преобладают над теорией
    - Визуалы и схемы вместо длинных текстов
  assessment:
    - Сценарные вопросы из рабочих ситуаций
    - Простые формулировки вопросов
    - Развёрнутый фидбек — они учатся через ошибки
  tone:
    - Дружелюбный, но не снисходительный
    - Уважение к практическому опыту
    - «Вы» + деловой, но не сухой тон
