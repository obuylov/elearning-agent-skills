# ============================================================
# Аудитория: Внешняя аудитория
# ============================================================

definition:
  name: Внешняя аудитория
  slug: external
  summary: >-
    Люди за пределами компании: клиенты, партнёры, дилеры, подрядчики,
    франчайзи, поставщики. Не знают внутренней кухни, не обязаны
    следовать корпоративным правилам, но должны что-то понять или уметь.
  characteristics:
    - Нет доступа к внутренним системам и контексту
    - Разный уровень подготовки — от нуля до высокого
    - Мотивация может быть внешней (партнёр обязан пройти) или внутренней (клиент хочет разобраться)
    - Бренд-ориентированный контент — курс = лицо компании
    - Самодостаточность — нет наставника, не к кому обратиться
  typical_roles:
    - Клиенты (пользователи продукта)
    - Партнёры и дилеры
    - Подрядчики и аутсорсеры
    - Франчайзи
    - Поставщики
    - Регуляторы (редко)

# ============================================================
# Вопросы для уточнения (WHO-фокус)
# ============================================================
clarification_questions:
  - question: Кто именно — клиенты, партнёры, подрядчики?
    approach: "Влияет на тон и глубину"
  - question: Они обязаны пройти курс или это добровольно?
    approach: "обязательно / добровольно — влияет на мотивацию"
  - question: Есть ли у них базовые знания по теме или начинают с нуля?
    approach: "есть / нет / разный уровень"
  - question: Есть ли у них доступ к вашим внутренним системам?
    approach: "да/нет — влияет на примеры и скриншоты"
  - question: Курс — часть партнёрской программы, обучения клиентов или сертификации?
    approach: "Определяет контекст и ожидания"

# ============================================================
# Шаблон секции brief.md (аудитория)
# ============================================================
brief_template:
  target_audience: external
  audience_profile: "[Тип: клиенты / партнёры / подрядчики / дилеры]"
  audience_size: "[Примерное количество]"
  mandatory_or_voluntary: "[обязательно / добровольно]"
  baseline_knowledge: "[есть / нет / разный]"
  access_to_internal_systems: "[да / нет]"
  context: "[Частью чего является курс: партнёрская программа / обучение клиентов / сертификация]"

# ============================================================
# Рекомендации по дизайну для этой аудитории
# ============================================================
design_adaptations:
  language:
    - Без внутреннего жаргона и аббревиатур
    - Бренд-тон — курс представляет компанию
    - Объяснять контекст, который «внутри» очевиден
  structure:
    - Полностью самодостаточный — вся информация внутри курса
    - Визуальные инструкции: скриншоты, схемы, видео
    - FAQ-блоки (accordion) для типичных вопросов
    - Контактная информация и ссылки на поддержку
  assessment:
    - Мягкая проверка для добровольных курсов
    - Строгая проверка для сертификационных (как compliance)
    - Практические задания: «Попробуйте сделать X в интерфейсе»
  tone:
    - Профессионально-дружелюбный
    - Обращение на «вы»
    - Без предположений об уровне знаний
    - Благодарность за время: «Спасибо, что проходите этот курс»
