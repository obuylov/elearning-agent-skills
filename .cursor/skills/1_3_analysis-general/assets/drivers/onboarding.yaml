# ============================================================
# Бизнес-драйвер: Onboarding (вход в роль, адаптация)
# ============================================================

definition:
  name: Onboarding
  slug: onboarding
  summary: >-
    Обучение, связанное с входом человека в новую роль, команду, функцию или организацию. Это мета-тип для адаптации, который собирает программу из модулей других категорий (процессы, продукты, навыки), сохраняя принципы дружелюбности и погружения в контекст.
  goal: Сократить время адаптации и быстрее довести человека до уверенной и безопасной работы.
  measurable_outcome: Ускорение адаптации, рост готовности к работе, снижение времени до продуктивности.
  behavior_change_required: true
  is_meta_type: true

  triggers:
    - Welcome-курсы и адаптация в компанию
    - Наём, перевод, адаптация в новую роль
    - Onboarding руководителей
    - Первые 30/60/90 дней
    - Ввод в контекст подразделения, культуры, процессов, инструментов

# ============================================================
# Предварительная диагностика: декомпозиция
# ============================================================
preliminary_diagnostics:
  name: Декомпозиция программы адаптации
  description: >-
    Onboarding — мета-тип. Внутри программы могут быть модули разных
    категорий. Задача — декомпозировать программу и для каждого подмодуля
    определить категорию и, при необходимости, свой драйвер.
  typical_decomposition:
    - module: "«Политика ИБ для новичков»"
      category: processes
      driver_override: compliance
      note: Жёсткий контроль, допуск
    - module: "«Наши продукты и клиенты»"
      category: products
      note: Обзорный формат
    - module: "«Настройка рабочих инструментов»"
      category: hardskills
      note: Пошаговые инструкции
    - module: "«Как общаться с клиентами»"
      category: softskills
      note: Кейсы, сценарии
    - module: "«История компании и рынок»"
      category: business
      note: Кругозор, без тестов

# ============================================================
# Вопросы для уточнения (WHY-фокус)
# ============================================================
clarification_questions:
  - question: Для какой роли адаптация?
    approach: Предложи из исходников
  - question: Тип адаптации?
    approach: "В компанию / в роль / после перевода — предложи вариант"
  - question: Сколько сейчас занимает выход на продуктивность? Целевое время?
    approach: "Предложи диапазон: месяц / два / три"
  - question: Есть наставник / buddy?
    approach: "да/нет"
  - question: Есть обязательные политики для новичков?
    approach: "да/нет, какие?"
  - question: Что новички спрашивают чаще всего?
    approach: Предложи типичные вопросы из опыта

  example_good_approach: >-
    Вместо «Для какой роли?» →
    «Из исходников похоже, что онбординг для менеджеров по продажам.
    Верно, или шире?»

# ============================================================
# Шаблон секции brief.md (драйвер)
# ============================================================
brief_template:
  business_driver: onboarding
  driver_focus: Быстрый вход в среду и выход на продуктивную работу
  is_meta_type: true
  measurable_outcome: Ускорение адаптации, снижение времени до продуктивности

  onboarding_type: "[в компанию / в роль / после перевода / руководитель]"
  target_role: "[Должность]"
  adaptation_timeline: "[30 / 60 / 90 дней]"
  time_to_productivity:
    current: "[сколько сейчас]"
    target: "[целевое]"

  onboarding_modules:
    - module: "[Название подмодуля]"
      category: "[processes / products / hardskills / softskills / business]"
      driver_override: "[compliance / null — если подмодуль имеет свой драйвер]"
      design_note: "[Какие design-принципы применить]"

  newcomer_challenges:
    common_questions: ["[Вопрос]"]
    common_mistakes: ["[Ошибка]"]

  key_contacts:
    - role: "[Кто]"
      how_to_reach: "[Как связаться]"

# ============================================================
# Принципы проектирования
# ============================================================
design_principles:
  - "Welcome-контент в самом начале: дружелюбный тон, снижение тревожности"
  - "Пошаговое погружение: от компании к роли, от общего к частному"
  - "«Первые 5 действий» после каждого модуля — конкретные шаги"
  - "Человечный тон: «мы рады, что вы с нами»"
  - "Не перегружать: лучше меньше контента, но с чёткими действиями"
  - Контакты и ресурсы поддержки — в конце каждого раздела
  - Каждый подмодуль наследует design-принципы своей категории
  - Compliance-модули внутри онбординга — с полным контролем
  - "Порядок модулей: welcome → контекст → инструменты → обязательные политики → навыки"

# ============================================================
# Стратегия оценки
# ============================================================
assessment_strategy:
  approach: mixed
  description: >-
    Зависит от подмодуля. Compliance-модули — с жёстким контролем.
    Остальные — лёгкая проверка или без проверки.
  passing_score_required: depends_on_module
