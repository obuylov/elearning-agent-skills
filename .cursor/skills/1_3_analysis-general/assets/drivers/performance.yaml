# ============================================================
# Бизнес-драйвер: Performance-driven (эффективность и результат)
# ============================================================

definition:
  name: Performance-driven
  slug: performance
  summary: >-
    Обучение, возникающее из-за реального рабочего разрыва: ошибок, просадки качества, низкой эффективности, неправильных действий, слабого навыка, проблем в коммуникации, управлении, сервисе, продажах, принятии решений или исполнении процессов.
  goal: Устранить рабочую проблему и изменить поведение, навык или качество выполнения работы.
  measurable_outcome: Устранение рабочих ошибок, улучшение качества, скорости, точности или эффективности выполнения.
  behavior_change_required: true

  triggers:
    - Ошибки, просадка KPI, снижение качества операций
    - Slabye hard/soft навыки, требующие улучшения результата
    - Remediation-обучение после провалов
    - Развитие навыков для текущей роли для роста эффективности

# ============================================================
# Предварительная диагностика: Mager & Pipe
# ============================================================
preliminary_diagnostics:
  name: Диагностика Mager & Pipe
  description: >-
    «Если бы от правильного выполнения зависела жизнь сотрудника,
    смог бы он это сделать?»
  outcomes:
    - answer: "Нет, не смог бы"
      diagnosis: Разрыв в знаниях или навыках
      action: Обучение — правильное решение. Продолжай.
    - answer: "Да, смог бы, но не делает"
      diagnosis: Разрыв в мотивации, среде или процессе
      action: >-
        Предупреди пользователя: «Проблема может быть не в знаниях.
        Обучение поможет только частично. Возможно, нужно менять процесс,
        мотивацию или инструменты.» Продолжай, но учти это в брифе.
  note: Не блокер — курс создаётся, но с пониманием ограничений.

  subtype_determination:
    name: Определение подтипа
    subtypes:
      remediation:
        description: Исправление существующих ошибок
        signs:
          - Есть конкретная проблема, данные, инциденты
        tone: Без осуждения, но чётко и прямо
        focus: "«Перестать делать Х, начать делать Y»"
        structure: "Кейс с ошибкой → разбор → правильная модель → практика"
      capability_building:
        description: Развитие нового навыка
        signs:
          - Нет критической ошибки, но нужно вырасти
        tone: Развивающий, мотивирующий
        focus: "«Научиться делать Х»"
        structure: "Теория → демонстрация → практика → обратная связь"

# ============================================================
# Вопросы для уточнения (WHY-фокус)
# ============================================================
clarification_questions:
  - question: Какая проблема стала причиной?
    approach: Предложи формулировку из исходников
  - question: Сотрудники не знают как правильно — или знают, но не делают?
    approach: Два варианта
  - question: Это исправление ошибок или развитие навыка?
    approach: Два варианта, объясни разницу простыми словами
  - question: Есть цифры — как часто ошибки, какой ущерб?
    approach: "да/нет, если да — кратко"
  - question: Как поймём, что обучение сработало?
    approach: Предложи метрику из контекста
  - question: Есть реальные случаи для разбора в курсе?
    approach: "да/нет"

  example_good_approach: >-
    Вместо «Какая проблема стала причиной?» →
    «Из исходников я вижу, что основная проблема — менеджеры неправильно
    оформляют заявки, из-за чего 30% возвращаются на доработку.
    Это та проблема, которую нужно решить?»

# ============================================================
# Шаблон секции brief.md (драйвер)
# ============================================================
brief_template:
  business_driver: performance
  driver_focus: Устранение рабочего разрыва и изменение поведения
  measurable_outcome: Устранение ошибок, улучшение качества/скорости/точности

  is_skill_gap: true/false
  non_training_factors: "[Если is_skill_gap=false — факторы кроме знаний]"
  subtype: "[remediation / capability_building]"

  performance_gap:
    current_state: "[Что происходит сейчас]"
    desired_state: "[Как должно быть]"
    gap_type: "[знания / навык / поведение / процесс]"

  key_problems:
    - problem: "[Ошибка / проблема]"
      frequency: "[как часто]"
      impact: "[последствия]"

  success_metrics:
    - metric: "[KPI]"
      current_value: "[сейчас]"
      target_value: "[цель]"

# ============================================================
# Принципы проектирования
# ============================================================
design_principles:
  - Реальные кейсы и рабочие ситуации — основа курса, не теория
  - "Фокус на изменении поведения: показать последствия правильного и неправильного действия"
  - Сценарные задания «что бы вы сделали?» с ветвлением
  - Практика с немедленной обратной связью
  - Тесты проверяют способность принять решение в ситуации, а не знание определений
  - "Remediation: тон без осуждения — «так бывает, но вот как правильно»"
  - "Capability building: тон мотивирующий — «вы уже хороши, а станете ещё лучше»"
  - Если is_skill_gap=false — явно указать в курсе, что успех зависит не только от обучения

# ============================================================
# Стратегия оценки
# ============================================================
assessment_strategy:
  approach: scenario-based
  description: >-
    Тесты через сценарные задания — «что бы вы сделали в ситуации X».
    Проверяют способность принять решение, а не знание определений.
  passing_score_required: false
  focus: принятие правильных решений в рабочих ситуациях
