# ============================================================
# Бизнес-драйвер: Compliance-driven (риски и стандарты)
# ============================================================

definition:
  name: Compliance-driven
  slug: compliance
  summary: >-
    Обучение, вызванное обязательными внешними или внутренними требованиями: законами, нормативами, регламентами, политиками, стандартами, требованиями аудита, безопасности, сертификации, допуска, аттестации или периодического подтверждения знаний.
  goal: Обеспечить соблюдение требований, снизить риски нарушений, подтвердить прохождение, понимание или готовность сотрудника действовать в допустимых рамках.
  measurable_outcome: Соблюдение требований, прохождение, подтверждение допуска или соответствия.
  behavior_change_required: true

  triggers:
    - Обязательные ежегодные курсы
    - Охрана труда, ИБ, AML, ПОД/ФТ, антикоррупция
    - Внутренние политики и кодексы
    - Обязательные сертификации и переаттестации
    - Допуск к роли, операции, системе или оборудованию
    - Экзаменационные и аттестационные модули

# ============================================================
# Предварительная диагностика — нет
# ============================================================
preliminary_diagnostics: null

# ============================================================
# Вопросы для уточнения (WHY-фокус)
# ============================================================
clarification_questions:
  - question: Какой документ обязывает это обучение?
    approach: Предложи вариант из исходников
  - question: Прохождение = условие допуска к работе?
    approach: "да/нет"
  - question: Есть пороговый балл для прохождения?
    approach: "да/нет, если да — какой?"
  - question: Нужна пересдача через время?
    approach: "да/нет, если да — через сколько?"
  - question: Что будет, если сотрудник не пройдёт?
    approach: "Предложи варианты: отстранение / повтор / уведомление руководителю"
  - question: Были реальные нарушения в компании?
    approach: "да/нет, если да — кратко"

  example_good_approach: >-
    Вместо «Какой нормативный документ является основанием?» →
    «Из исходников я вижу, что основание — Политика информационной безопасности v2.3.
    Это верно, или есть другой документ?»

# ============================================================
# Шаблон секции brief.md (драйвер)
# ============================================================
brief_template:
  business_driver: compliance
  driver_focus: Соблюдение требований и снижение рисков нарушений
  measurable_outcome: Соблюдение требований, подтверждение допуска или соответствия

  regulatory_basis:
    - name: "[Название закона / стандарта / политики]"
      id: "[Номер / код]"
      date: "[Дата редакции]"

  mandatory_knowledge:
    - "[Что сотрудник обязан знать]"
  mandatory_behavior:
    - "[Что обязан делать / не делать]"

  key_risks:
    - risk: "[Описание риска]"
      consequence_employee: "[Последствия для сотрудника]"
      consequence_company: "[Последствия для компании]"

  certification:
    required: true/false
    type: "[допуск / сертификат / аттестация / переаттестация]"
    passing_score: "[пороговый балл]"
    recertification_period: "[период]"
    failure_consequence: "[что при непрохождении]"

# ============================================================
# Принципы проектирования
# ============================================================
design_principles:
  - Принцип minimum viable compliance — только то, что требует нормативный документ, без «полезных дополнений»
  - Каждое требование подкреплено примером нарушения и его последствий
  - Жёсткий контроль знаний — пороговый балл обязателен, если есть допуск
  - Финальный тест — экзамен, а не самопроверка
  - Фидбек в тестах объясняет, почему ответ неправильный, со ссылкой на требование
  - Нельзя «разбавлять» обязательный контент развлекательными элементами в ущерб точности
  - Язык — точный, но не канцелярский

# ============================================================
# Стратегия оценки
# ============================================================
assessment_strategy:
  approach: strict
  description: >-
    Жёсткий контроль: пороговый балл, экзаменационный формат.
    Тесты проверяют понимание и способность применить, а не запоминание формулировок.
  passing_score_required: true
  retake_allowed: true
