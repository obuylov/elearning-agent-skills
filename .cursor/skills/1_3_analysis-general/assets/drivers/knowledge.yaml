# ============================================================
# Бизнес-драйвер: Knowledge (экспертиза и контекст)
# ============================================================

definition:
  name: Knowledge
  slug: knowledge
  summary: >-
    Обучение, направленное на формирование понимания темы, расширение кругозора, развитие профессионального мышления, общей эрудиции, управленческого или экспертного кругозора, подготовку к будущим задачам или повышение уровня знаний без жёсткой привязки к немедленному изменению поведения.
  goal: Дать системное понимание, картину темы, концептуальную базу или развивающее содержание.
  measurable_outcome: Рост понимания, осведомленности, концептуальной базы и готовности к будущему применению.
  behavior_change_required: false

  triggers:
    - Общеразвивающие курсы и профессиональный кругозор
    - Отраслевой и бизнес-контекст, "финансы для нефинансистов"
    - Курсы для кадрового резерва и leadership development
    - Объясняющие и обзорные курсы
    - Образовательные модули "на вырост"
    - Контент-трансформация из лекций/вебинаров без жёсткой поведенческой задачи

# ============================================================
# Предварительная диагностика: скрытый performance gap
# ============================================================
preliminary_diagnostics:
  name: Проверка на скрытый Performance Gap
  description: >-
    Knowledge — «catch-all» тип. Иногда за запросом стоит реальная
    рабочая проблема. Проведи быструю диагностику.
  self_check_questions:
    - В исходниках есть упоминания ошибок, проблем, жалоб?
    - Заказчик упоминал конкретные рабочие ситуации, которые нужно улучшить?
    - Есть KPI или метрики, которые должны измениться?
  if_detected: >-
    Предложи: «Похоже, за запросом может стоять конкретная рабочая задача.
    Возможно, драйвер Performance подойдёт лучше. Остаёмся на Knowledge
    или переключаемся?»
  note: Не блокер. Если пользователь подтверждает Knowledge — продолжай.

# ============================================================
# Вопросы для уточнения (WHY-фокус)
# ============================================================
clarification_questions:
  - question: Зачем это аудитории?
    approach: Предложи связь с работой из контекста
  - question: Обзор или погружение?
    approach: Два варианта, объясни разницу
  - question: Это из лекции / вебинара / очного курса?
    approach: "да/нет, если да — что важно сохранить?"
  - question: Нужна проверка знаний?
    approach: "Тест на понимание / самооценка / без проверки"
  - question: Есть темы, которые точно убрать / оставить?
    approach: Предложи scope из исходников

  example_good_approach: >-
    Вместо «Зачем это нужно?» →
    «Из исходников вижу, что тема — основы финансового анализа
    для руководителей нефинансовых подразделений. Верно?»

# ============================================================
# Шаблон секции brief.md (драйвер)
# ============================================================
brief_template:
  business_driver: knowledge
  driver_focus: Системное понимание, концептуальная база, кругозор
  measurable_outcome: Рост понимания и готовности к будущему применению

  hidden_performance_gap:
    detected: true/false
    notes: "[Если detected — что именно обнаружено]"
    user_confirmed_knowledge: true

  content_source:
    type: "[авторский / из лекции / из вебинара / компиляция]"
    original_format: "[лекция / статья / книга / вебинар / очная программа]"
    transformation_notes: "[Что сохранить, что убрать при трансформации]"

  depth:
    audience_level: "[новички / практики / эксперты / смешанная]"
    approach: "[обзор / погружение / от обзора к деталям]"

# ============================================================
# Принципы проектирования
# ============================================================
design_principles:
  - Не пытаться «поменять поведение» — дать картину и понимание
  - Теория с наглядными примерами и аналогиями из реальности аудитории
  - "Визуализация структуры знаний: схемы, карты, диаграммы"
  - "Постепенное усложнение: от основ к деталям"
  - "Связь с реальностью: «как это проявляется в вашей работе»"
  - Ссылки на дополнительные материалы для самостоятельного углубления
  - "При трансформации из лекции: убрать воду и повторы, сохранить структуру и примеры"
  - "Не перетестировать: достаточно лёгкой проверки или самооценки"

# ============================================================
# Стратегия оценки
# ============================================================
assessment_strategy:
  approach: light
  description: >-
    Лёгкая проверка на понимание концепций, не на запоминание.
    Самооценка или проверка понимания — не экзамен.
  passing_score_required: false
  options:
    - Проверка на понимание концепций
    - "Самооценка: «Насколько вы теперь уверены в понимании темы?»"
    - Без проверки — достаточно ознакомления
