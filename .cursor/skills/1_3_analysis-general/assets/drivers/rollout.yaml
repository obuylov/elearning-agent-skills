# ============================================================
# Бизнес-драйвер: Rollout / Process Change (запуск нового)
# ============================================================

definition:
  name: Rollout / Process Change
  slug: rollout
  summary: >-
    Обучение, связанное с изменениями в компании: запуском новых процессов, продуктов, систем, инструментов, сервисов, ролей, политик, моделей взаимодействия или организационных изменений. Включает повышение осведомленности и принятие (Awareness / Adoption).
  goal: Помочь сотрудникам перейти на новый способ работы, понять, как устроено изменение, что именно меняется и как действовать в новой реальности.
  measurable_outcome: Переход на новый способ работы, освоение изменений, корректное применение нового процесса или системы.
  behavior_change_required: true

  triggers:
    - Новый продукт или новая линейка услуг
    - Новый клиентский сценарий или бизнес-процесс
    - Внедрение CRM, ERP, LMS, HR-систем
    - Реорганизация, изменение ролей и взаимодействия
    - Change management-контент
    - Анонс и продвижение внутренних решений и инициатив

# ============================================================
# Предварительная диагностика: ADKAR
# ============================================================
preliminary_diagnostics:
  name: ADKAR-диагностика готовности аудитории
  description: >-
    Определи, на каком этапе принятия изменения находится аудитория.
  stages:
    - stage: Awareness
      question: Люди знают, что изменение происходит?
      if_not_passed: "Начать курс с объяснения «что и почему меняется»"
    - stage: Desire
      question: Люди хотят участвовать?
      if_not_passed: "Добавить блок мотивации: ценность изменения для них лично"
    - stage: Knowledge
      question: Люди знают, как работать по-новому?
      if_not_passed: "Основная часть курса: инструкции, шаги, примеры"
    - stage: Ability
      question: Люди могут применить на практике?
      if_not_passed: "Добавить практику, симуляции, тренажёры"
    - stage: Reinforcement
      question: Как закрепить после обучения?
      if_not_passed: "Добавить ресурсы поддержки, чек-листы, FAQ"
  action: Запиши в бриф, какие этапы аудитория уже прошла, а какие — нет.

  awareness_gate:
    description: >-
      Если задача — только «заинтересовать» или «подготовить почву»
      (ADKAR: Awareness/Desire не пройдены, а Knowledge/Ability не требуются),
      возможно, это задача не обучения, а коммуникации.
    criteria:
      - Нужна интерактивность? Нет → коммуникация
      - Нужно отслеживать прохождение? Нет → коммуникация
      - "Объём контента < 3 минут? → коммуникация"
    if_communication: >-
      Предупреди пользователя: «Это больше похоже на задачу внутренних
      коммуникаций. Рассмотрите рассылку, видео, пост. Если нужен курс — продолжаем.»
    note: Не блокер, а информирование.

# ============================================================
# Вопросы для уточнения (WHY-фокус)
# ============================================================
clarification_questions:
  - question: Что меняется?
    approach: Предложи формулировку из исходников
  - question: Когда вступает в силу? Есть параллельный период?
    approach: "Предложи варианты: уже / через месяц / дата"
  - question: Люди знают об изменении?
    approach: "да, уже объявили / нет, курс — первая коммуникация"
  - question: Что конкретно в действиях сотрудника меняется?
    approach: Предложи список из исходников
  - question: Будет сопротивление? Почему?
    approach: "да/нет, если да — предложи причины"
  - question: Где поддержка после обучения?
    approach: "FAQ / чат / наставник / hotline"

  example_good_approach: >-
    Вместо «Что меняется?» →
    «Из исходников я вижу, что внедряется новая CRM-система Bitrix24
    вместо Excel-таблиц. Верно?»

# ============================================================
# Шаблон секции brief.md (драйвер)
# ============================================================
brief_template:
  business_driver: rollout
  driver_focus: Переход на новый способ работы
  measurable_outcome: Корректное применение нового процесса или системы

  change_description: "[Что меняется — 2-3 предложения]"
  change_scope: "[отдел / группа ролей / компания]"
  go_live_date: "[Дата вступления в силу]"
  transition_period: "[Есть ли параллельный период]"

  adkar_status:
    awareness: "[пройден / не пройден]"
    desire: "[пройден / не пройден]"
    knowledge: "[не пройден — основная задача курса]"
    ability: "[не пройден — нужна практика]"
    reinforcement: "[ресурсы поддержки после курса]"

  before_after:
    - aspect: "[Аспект]"
      before: "[Как было]"
      after: "[Как стало]"

  resistance_points:
    - "[Почему могут сопротивляться]"

  support_resources:
    - type: "[FAQ / hotline / чат / наставник]"
      contact: "[как обратиться]"

# ============================================================
# Принципы проектирования
# ============================================================
design_principles:
  - Начать с «зачем» — объяснить причину изменения до инструкций
  - Визуальное сравнение «было → стало» на каждом значимом этапе
  - Пошаговые инструкции для нового процесса / интерфейса
  - Акцент на том, что остаётся прежним — для снижения тревоги
  - Адресация сопротивления — не игнорировать, а проговаривать
  - Ресурсы поддержки в конце каждого модуля
  - Если ADKAR показывает, что awareness/desire не пройдены — встроить мотивационный блок перед инструкциями
  - Если задача — только awareness/desire (подготовка почвы), формат короткий и вдохновляющий

# ============================================================
# Стратегия оценки
# ============================================================
assessment_strategy:
  approach: practical
  description: >-
    Тесты проверяют способность выполнить новый процесс, а не запоминание
    инструкций. Сценарные вопросы «что вы сделаете в ситуации X».
  passing_score_required: false
  focus: применение нового способа работы
