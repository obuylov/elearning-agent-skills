# ============================================================
# Категория курса: Процессы и регламенты
# ============================================================

definition:
  name: Процессы и регламенты
  slug: processes
  summary: >-
    Обучение, вызванное необходимостью разъяснить сотрудникам содержание, цели и ценность процессов, в которых они принимают участие в рамках своих должностных обязанностей.
  goal: Помочь сотрудникам понять, как устроен процесс, каково его назначение и каковы роли участников процесса. Показать важность и ценность процесса на разных уровнях.
  measurable_outcome: Корректное применение процесса, минимизация отклонений/ошибок, соблюдение регламентов, фиксируемое изменение способа работы.
  behavior_change_required: true
  typical_content:
    - Бизнес-процессы и их этапы
    - Внедрение CRM, ERP, LMS, HR-систем
    - Реорганизация, изменение ролей и взаимодействия
    - Change management-контент
    - Обучение при трансформации функций и команд
    - Регламенты, политики, SOP
    - Правила, нормы, ограничения
    - Процедуры действий в типовых и нештатных ситуациях
    - Зоны ответственности и эскалация

# ============================================================
# Фокусы анализа исходников (WHAT-фокус)
# ============================================================
source_analysis_focus:

  process_description:
    description: Описание процесса
    extract:
      - Этапы процесса (от начала до конца)
      - Входы, выходы, участники каждого этапа
      - Точки принятия решений и ветвления
      - Исключения и нештатные ситуации

  rules_and_norms:
    description: Правила и нормы
    extract:
      - Обязательные требования (must)
      - Рекомендации (should)
      - Запреты (must not)
      - Границы допустимого

  documents_and_forms:
    description: Документы и формы
    extract:
      - Какие документы заполняются
      - Шаблоны и образцы
      - Правила оформления

  roles_and_responsibilities:
    description: Роли и ответственность
    extract:
      - Кто за что отвечает
      - Матрица RACI (если есть)
      - Порядок эскалации

# ============================================================
# Вопросы для уточнения (WHAT-фокус)
# ============================================================
clarification_questions:
  - question: Какой именно процесс / регламент?
    approach: Предложи формулировку из исходников
  - question: Это один процесс или несколько связанных?
    approach: Предложи границы из исходников
  - question: Есть ли типичные нарушения или точки, где люди путаются?
    approach: "да/нет, если да — какие?"
  - question: Есть шаблоны / формы / чек-листы, которые нужно показать?
    approach: "да/нет"
  - question: Кто ещё участвует в процессе кроме обучаемого?
    approach: Предложи из исходников

# ============================================================
# Шаблон секции brief.md (категория)
# ============================================================
brief_template:
  course_category: processes
  category_focus: "[Название процесса / регламента]"

  process_scope:
    name: "[Процесс]"
    stages_count: "[Количество этапов]"
    participants: ["[Роли]"]
    key_decision_points: ["[Где нужно принять решение]"]

  pain_points:
    - "[Где люди путаются / ошибаются]"

  artifacts:
    forms: ["[Документы и формы]"]
    checklists: ["[Чек-листы]"]

# ============================================================
# Рекомендованные типы блоков
# ============================================================
recommended_blocks:
  primary:
    - type: horizontal_scene
      reason: Пошаговый walkthrough процесса (фреймы сцены, а не блок)
    - type: accordion
      reason: Детали по этапам или исключениям
    - type: image
      reason: Блок-схема процесса
  secondary:
    - type: tabs
      reason: Сравнение вариантов или ролей
    - type: note
      reason: Важные ограничения и запреты (note_type: warning / important)

