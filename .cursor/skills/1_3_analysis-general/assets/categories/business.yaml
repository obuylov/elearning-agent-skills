# ============================================================
# Категория курса: Бизнес-среда
# ============================================================

definition:
  name: Бизнес-среда
  slug: business
  summary: >-
    Обучение, направленное на формирование контекста и понимания бизнес-среды: отрасль, рынок, стратегия компании, финансы, конкуренты, тренды, история. 
    Оно формирует профессиональный кругозор и понимание общей картины, без привязки к немедленным действиям.
  goal: Дать сотрудникам системное понимание бизнеса компании, стратегии и рыночного контекста.
  measurable_outcome: Рост осведомлённости, расширение профессионального кругозора, способность применять бизнес-логику в работе.
  behavior_change_required: false
  typical_content:
    - Отрасль и структура рынка
    - Стратегия и позиционирование компании
    - Конкурентная среда и тренды отрасли
    - Финансовая грамотность и базовые модели
    - История компании, культура, миссия, ценности
    - Регуляторная и макроэкономическая среда

# ============================================================
# Фокусы анализа исходников (WHAT-фокус)
# ============================================================
source_analysis_focus:

  industry_context:
    description: Отрасль и рынок
    extract:
      - Структура рынка, основные игроки
      - Тренды и прогнозы
      - Регуляторная среда

  company_context:
    description: Компания
    extract:
      - Позиция на рынке
      - Стратегия и приоритеты
      - История, миссия, ценности

  knowledge_structure:
    description: Концептуальная структура
    extract:
      - Ключевые концепции, термины, модели
      - "Логика: от простого к сложному"
      - Междисциплинарные связи

  examples_and_cases:
    description: Примеры и иллюстрации
    extract:
      - Кейсы из отрасли
      - Наглядные аналогии
      - Визуальные модели и схемы

# ============================================================
# Вопросы для уточнения (WHAT-фокус)
# ============================================================
clarification_questions:
  - question: Какая тема / область?
    approach: Предложи формулировку из исходников
  - question: Какие границы — что входит, что нет?
    approach: Предложи scope из исходников
  - question: Какая связь с работой аудитории?
    approach: Предложи из контекста
  - question: Нужен обзор или погружение?
    approach: Два варианта, объясни разницу
  - question: Есть данные, которые нужно визуализировать?
    approach: "да/нет"

# ============================================================
# Шаблон секции brief.md (категория)
# ============================================================
brief_template:
  course_category: business
  category_focus: "[Тема / область]"

  subject:
    topic: "[Тема]"
    scope: "[Что входит, что нет]"
    relevance: "[Зачем аудитории]"
    work_connection: "[Связь с работой]"

  knowledge_structure:
    level_1_basics: ["[Базовые понятия]"]
    level_2_intermediate: ["[Углублённые темы]"]
    key_connections: ["[Связи между темами]"]

# ============================================================
# Рекомендованные типы блоков
# ============================================================
recommended_blocks:
  primary:
    - type: tinymce
      reason: Описание контекста и концепций
    - type: timeline
      reason: История, этапы развития, тренды
    - type: image
      reason: Инфографика, схемы, диаграммы
  secondary:
    - type: tabs
      reason: Сравнение подходов / моделей / игроков
    - type: accordion
      reason: Углубление в отдельные темы

# ============================================================
# Примеры из матрицы (по драйверам)
# ============================================================
examples_by_driver:
  compliance: "Стандарты безопасности полётов в мире"
  rollout: "Обзор рынка: почему компания решила сменить стратегию"
  performance: "Разбор лучших практик отрасли для улучшения KPI"
  onboarding: "История компании и её место в индустрии"
  knowledge: "Курс «Финансы для нефинансистов»"
