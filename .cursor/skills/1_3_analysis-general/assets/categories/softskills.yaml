# ============================================================
# Категория курса: Soft skills
# ============================================================

definition:
  name: Soft skills
  slug: softskills
  summary: >-
    Обучение, направленное на формирование навыков, которые помогают сотруднику эффективно работать с людьми, решать задачи и адаптироваться к новым условиям — личностные, коммуникативные, когнитивные и управленческие.
  goal: Помочь сотрудникам обрести навыки, помогающие им выстраивать эффективные взаимоотношения с клиентами и командой, анализировать ситуации и предлагать решения.
  measurable_outcome: Сокращение времени выхода на целевой уровень продуктивности, успешное самостоятельное выполнение ключевых задач, положительная обратная связь.
  behavior_change_required: true
  typical_content:
    - Коммуникация (устная, письменная, деловая)
    - Ведение переговоров и управление исполнением
    - Управление и лидерство
    - Продажи и клиентский сервис
    - Командная работа, конфликты, обратная связь
    - Критическое мышление и креативность
    - Тайм-менеджмент и стрессоустойчивость
    - Эмоциональный интеллект
    - Этика, инклюзивность, разнообразие

# ============================================================
# Фокусы анализа исходников (WHAT-фокус)
# ============================================================
source_analysis_focus:

  behavioral_models:
    description: Модели поведения
    extract:
      - Желаемые паттерны поведения
      - Нежелательные паттерны (антипримеры)
      - Ситуации, в которых навык проявляется

  scenarios:
    description: Рабочие сценарии
    extract:
      - Диалоги, переговоры, конфликтные ситуации
      - Примеры из практики компании
      - "«Было плохо → стало хорошо»"

  frameworks:
    description: Модели и фреймворки
    extract:
      - Теоретические модели (если есть)
      - Пошаговые алгоритмы действий
      - Чек-листы для самопроверки

  emotional_context:
    description: Эмоциональный контекст
    extract:
      - Чего боятся / избегают сотрудники
      - Какие ситуации вызывают стресс
      - Как снять напряжение

# ============================================================
# Вопросы для уточнения (WHAT-фокус)
# ============================================================
clarification_questions:
  - question: Какой именно навык?
    approach: Предложи формулировку из исходников
  - question: В каких рабочих ситуациях проявляется?
    approach: Предложи типичные сценарии
  - question: Есть ли модель / алгоритм, которому нужно научить?
    approach: "да/нет, если да — какой?"
  - question: Есть реальные кейсы / истории для разбора?
    approach: "да/нет"
  - question: Нужен ли ролевой тренажёр?
    approach: "да/нет"

# ============================================================
# Шаблон секции brief.md (категория)
# ============================================================
brief_template:
  course_category: softskills
  category_focus: "[Какой навык / тема]"

  skill_scope:
    skills: ["[Навык]"]
    key_situations: ["[Ситуация, в которой навык критичен]"]
    desired_behavior: "[Какое поведение хотим видеть]"

  real_cases:
    - scenario: "[Ситуация]"
      wrong_action: "[Что делают неправильно]"
      right_action: "[Как нужно]"

  frameworks:
    - "[Модель / алгоритм для обучения]"

# ============================================================
# Рекомендованные типы блоков
# ============================================================
recommended_blocks:
  primary:
    - type: tinymce
      reason: Описание модели поведения и сценариев
    - type: flipcard
      reason: "Ситуация → правильная реакция"
    - type: accordion
      reason: Разбор кейсов с деталями
  secondary:
    - type: tabs
      reason: Сравнение эффективных и неэффективных стратегий
    - type: timeline
      reason: Алгоритм действий в сложной ситуации
    - type: image
      reason: Визуализация модели / фреймворка

# ============================================================
# Примеры из матрицы (по драйверам)
# ============================================================
examples_by_driver:
  compliance: "Кодекс этики и инклюзивность (обязательно для всех)"
  rollout: "Переход на гибкие методологии (Agile/Scrum как культура)"
  performance: "Тренинг по работе с возражениями (если упали продажи)"
  onboarding: "Тренинг по корпоративным стандартам коммуникации"
  knowledge: "Теории лидерства или основы психологии для резерва"
