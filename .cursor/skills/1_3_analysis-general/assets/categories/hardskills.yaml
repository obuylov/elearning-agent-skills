# ============================================================
# Категория курса: Hard skills
# ============================================================

definition:
  name: Hard skills
  slug: hardskills
  summary: >-
    Обучение профессиональным знаниям и умениям, которые требуются для выполнения определённой работы, легко измеримы и связаны с техническими аспектами профессии.
  goal: Обеспечить уровень владения навыками, необходимыми для выполнения конкретных профессиональных задач.
  measurable_outcome: Демонстрация технического навыка в рабочей среде (скорость, точность, стандарт), успешное выполнение задачи без ошибок, снижение брака/переделок.
  behavior_change_required: true
  typical_content:
    - Работа с софтом, системами автоматизации, интерфейсами
    - Технические процедуры и методики
    - Языки программирования, формулы, инструменты анализа
    - Создание стратегий, планирование и управление проектами
    - Навыки организации и проведения технологических процессов
    - Управление финансами и разработка концепций
    - Настройка оборудования, приборов
    - Специфические профессиональные навыки для операционных задач

# ============================================================
# Фокусы анализа исходников (WHAT-фокус)
# ============================================================
source_analysis_focus:

  tools_and_systems:
    description: Инструменты и системы
    extract:
      - Какие инструменты / системы / софт
      - Версии и среды
      - Уровень владения (базовый / продвинутый)

  procedures:
    description: Технические процедуры
    extract:
      - Пошаговые инструкции
      - Скриншоты, экраны, формы
      - Типичные и нештатные сценарии

  prerequisites:
    description: Предварительные знания
    extract:
      - Что нужно знать / уметь до курса
      - Какие доступы / настройки нужны

  practice_scenarios:
    description: Сценарии для практики
    extract:
      - Типовые задачи для отработки
      - Эталонные результаты
      - Критерии правильного выполнения

# ============================================================
# Вопросы для уточнения (WHAT-фокус)
# ============================================================
clarification_questions:
  - question: Какие инструменты / навыки охватывает курс?
    approach: Предложи из исходников
  - question: Уровень аудитории — с нуля или продвинутый?
    approach: "с нуля / базовый / продвинутый"
  - question: Нужны ли пошаговые инструкции (с экранами)?
    approach: "да/нет"
  - question: Есть практические задания для отработки?
    approach: "да/нет, если да — какие?"
  - question: Нужны ли предварительные знания?
    approach: Предложи из контекста

# ============================================================
# Шаблон секции brief.md (категория)
# ============================================================
brief_template:
  course_category: hardskills
  category_focus: "[Какие навыки / инструменты]"

  skills_scope:
    tools: ["[Инструмент / система]"]
    skill_level: "[с нуля / базовый / продвинутый]"
    prerequisites: ["[Что нужно знать до курса]"]

  key_procedures:
    - "[Процедура / операция для освоения]"

  practice_tasks:
    - "[Типовая задача для отработки]"

# ============================================================
# Рекомендованные типы блоков
# ============================================================
recommended_blocks:
  primary:
    - type: horizontal_scene
      reason: Пошаговые инструкции с экранами (walkthrough как вложенная сцена)
    - type: image
      reason: Скриншоты интерфейсов
    - type: accordion
      reason: Детали процедур и альтернативные сценарии
  secondary:
    - type: hotspot
      reason: Интерактивный обзор интерфейса
    - type: tabs
      reason: Сравнение способов выполнения

# ============================================================
# Примеры из матрицы (по драйверам)
# ============================================================
examples_by_driver:
  compliance: "Тест на знание ПТЭ и ПТБ (промбезопасность)"
  rollout: "Инструкция по работе в обновлённом интерфейсе системы"
  performance: "Мастер-класс по продвинутым формулам Excel или SQL"
  onboarding: "Стартовый набор инструментов (настройка почты, софта)"
  knowledge: "Воркшоп по трендам в кодинге или дизайне"
