# ============================================================
# Категория курса: Продукты и услуги
# ============================================================

definition:
  name: Продукты и услуги
  slug: products
  summary: >-
    Обучение продукту (товары или услуги). Делится на три уровня: 1) Базовый (общее назначение, для всех), 2) Специальный (подробное описание и классификация, для смежных ролей), 3) Профессиональный (технология производства и анализ, для профильных ролей).
  goal: Обеспечить уровень знания продукта, который позволит сотрудникам быть максимально продуктивными, а также минимизировать количество ошибок, рекламаций и брака.
  measurable_outcome: Снижение количества жалоб/ошибок, связанных с продуктом; рост положительных отзывов клиентов о консультации и точности рекомендаций.
  behavior_change_required: true
  typical_content:
    - Знакомство с продуктом в рамках welcome-курса
    - Технология производства и законодательная база
    - Каталог продуктов / линейка услуг
    - Описание, содержание, классификация
    - Конкурентные преимущества и недостатки
    - Целевые клиенты и сценарии использования
    - Тарифы, условия, ограничения
    - История и философия бренда

# ============================================================
# Фокусы анализа исходников (WHAT-фокус)
# ============================================================
source_analysis_focus:

  product_catalog:
    description: Каталог продуктов / услуг
    extract:
      - Перечень продуктов / услуг
      - Группировка (линейки, категории)
      - Ключевые характеристики каждого

  value_proposition:
    description: Ценность для клиента
    extract:
      - "«Зачем клиенту?» — ответ для каждого продукта"
      - Конкурентные преимущества
      - Сценарии использования

  target_customers:
    description: Целевые клиенты
    extract:
      - Сегменты клиентов
      - Типичные потребности
      - Как подбирать продукт под клиента

  terms_and_conditions:
    description: Условия и ограничения
    extract:
      - Тарифы, цены, скидки
      - Условия подключения / отключения
      - Ограничения и исключения

# ============================================================
# Вопросы для уточнения (WHAT-фокус)
# ============================================================
clarification_questions:
  - question: Какие продукты / услуги охватывает курс?
    approach: Предложи список из исходников
  - question: Весь каталог или конкретная линейка?
    approach: Предложи границы
  - question: Для кого эти продукты — какие клиенты?
    approach: Предложи сегменты из исходников
  - question: Нужно ли сравнение с конкурентами?
    approach: "да/нет"
  - question: Есть часто задаваемые вопросы от клиентов?
    approach: "да/нет, если да — кратко"

# ============================================================
# Шаблон секции brief.md (категория)
# ============================================================
brief_template:
  course_category: products
  category_focus: "[Какие продукты / услуги]"

  product_scope:
    products: ["[Продукт 1]", "[Продукт 2]"]
    scope: "[весь каталог / конкретная линейка / новый продукт]"

  target_customers:
    segments: ["[Сегмент]"]
    typical_needs: ["[Потребность]"]

  key_differentiators:
    - "[Конкурентное преимущество]"

  common_client_questions:
    - "[Вопрос]"

# ============================================================
# Рекомендованные типы блоков
# ============================================================
recommended_blocks:
  primary:
    - type: tabs
      reason: Сравнение продуктов / тарифов
    - type: flipcard
      reason: "Продукт → его ценность для клиента"
    - type: accordion
      reason: Детали по каждому продукту
  secondary:
    - type: image
      reason: Визуализация продуктовой линейки
    - type: hotspot
      reason: Интерактивная карта продуктового портфеля

# ============================================================
# Примеры из матрицы (по драйверам)
# ============================================================
examples_by_driver:
  compliance: "Сертификация на допуск к работе со сложным оборудованием"
  rollout: "Запуск новой линейки тарифов или услуг"
  performance: "Глубокое изучение фишек продукта для роста чека"
  onboarding: "Базовый каталог: что мы продаём и кто наш клиент"
  knowledge: "Как наши продукты меняют жизни людей (философия бренда)"
