# ============================================================
# Матрица 5×5: Бизнес-драйвер × Категория курса
# ============================================================
# Используется как справочник примеров при определении позиции
# проекта в матрице (analysis-router) и при брифовании (analysis-general).

axes:
  business_driver:
    description: "Зачем делаем курс? Бизнес-мотивация."
    values:
      - slug: compliance
        name: "Compliance-driven (риски и стандарты)"
      - slug: rollout
        name: "Rollout / Process Change (запуск нового)"
      - slug: performance
        name: "Performance-driven (эффективность и результат)"
      - slug: onboarding
        name: "Onboarding (вход в роль, адаптация)"
      - slug: knowledge
        name: "Knowledge (экспертиза и контекст)"

  course_category:
    description: "Что делаем? Предметная область курса."
    values:
      - slug: processes
        name: "Процессы и регламенты"
      - slug: products
        name: "Продукты и услуги"
      - slug: hardskills
        name: "Hard skills"
      - slug: softskills
        name: "Soft skills"
      - slug: business
        name: "Бизнес-среда"

# ============================================================
# Примеры для каждой ячейки матрицы
# ============================================================
examples:
  compliance:
    processes: "Обязательный ежегодный курс по ИБ или антикоррупции"
    products: "Сертификация на допуск к работе со сложным оборудованием"
    hardskills: "Тест на знание ПТЭ и ПТБ (промбезопасность)"
    softskills: "Кодекс этики и инклюзивность (обязательно для всех)"
    business: "Стандарты безопасности полётов в мире"

  rollout:
    processes: "Промо-ролик «Зачем нам новая CRM», чтобы снять сопротивление"
    products: "Запуск новой линейки тарифов или услуг"
    hardskills: "Инструкция по работе в обновлённом интерфейсе системы"
    softskills: "Переход на гибкие методологии (Agile/Scrum как культура)"
    business: "Обзор рынка: почему компания решила сменить стратегию"

  performance:
    processes: "Кампания по снижению ошибок в заполнении отчётности"
    products: "Глубокое изучение фишек продукта для роста чека"
    hardskills: "Мастер-класс по продвинутым формулам Excel или SQL"
    softskills: "Тренинг по работе с возражениями (если упали продажи)"
    business: "Разбор лучших практик отрасли для улучшения KPI"

  onboarding:
    processes: "Welcome-курс: «Наши ценности и правила безопасности»"
    products: "Базовый каталог: что мы продаём и кто наш клиент"
    hardskills: "Стартовый набор инструментов (настройка почты, софта)"
    softskills: "Тренинг по корпоративным стандартам коммуникации"
    business: "История компании и её место в индустрии"

  knowledge:
    processes: "Лекция о трендах в области кибербезопасности"
    products: "Как наши продукты меняют жизни людей (философия бренда)"
    hardskills: "Воркшоп по трендам в кодинге или дизайне"
    softskills: "Теории лидерства или основы психологии для резерва"
    business: "Курс «Финансы для нефинансистов»"
