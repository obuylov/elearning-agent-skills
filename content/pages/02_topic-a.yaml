page:
  id: page_02_01
  title: "Как работает фишинг"
  module: module_02
  duration_minutes: 5
  blocks:
    - id: blk_02_01_01
      type: text
      status: filled
      content: >-
        Фишинг — это вид кибератаки, при которой злоумышленник выдаёт
        себя за доверенное лицо, чтобы выманить у вас конфиденциальную
        информацию: пароли, данные карт, доступы к системам.


        Почему фишинг работает? Потому что атакует не технику, а человека.
        Злоумышленники давят на срочность, страх и доверие. Они знают,
        что в потоке рабочих задач вы можете не заметить подвох.

    - id: blk_02_01_02
      type: tabs
      status: filled
      items:
        - title: "Email-фишинг"
          content: >-
            Массовая рассылка поддельных писем. Письмо выглядит как
            сообщение от банка, службы доставки или IT-отдела. Содержит
            ссылку на поддельный сайт или вредоносное вложение. Пример:
            письмо от «it-support@tehnoqroup.ru» (буква q вместо g) с
            просьбой срочно сменить пароль.

        - title: "Целевой фишинг"
          content: >-
            Атака направлена на конкретного человека. Злоумышленник
            изучает жертву через соцсети и готовит персонализированное
            сообщение. Пример: письмо якобы от вашего руководителя с
            вложением «отчет_март.xlsx», содержащим вредоносный макрос.

        - title: "Фишинг в мессенджерах"
          content: >-
            Сообщения в WhatsApp, Telegram с просьбами перевести деньги,
            перейти по ссылке или сообщить код подтверждения. Часто
            используют взломанный аккаунт коллеги: «Привет, скинь
            код из SMS, мне случайно на твой номер пришёл».

    - id: blk_02_01_03
      type: image
      status: prompt_ready
      src: ""
      alt: "Пример фишингового письма с подсвеченными красными флагами"
      prompt: >-
        Screenshot-style illustration of a phishing email in a mail client
        interface. The email has a fake sender 'it-support@tehnoqroup.ru',
        subject 'Urgent: Your password expires in 2 hours', a red button
        'RENEW PASSWORD'. Red annotation arrows pointing to: (1) misspelled
        domain, (2) urgency in subject, (3) suspicious button URL shown in
        tooltip. Clean corporate style, blue and red accents on white
        background, 16:9 aspect ratio.

    - id: blk_02_01_04
      type: text
      status: filled
      content: >-
        Запомните 5 красных флагов фишинга:


        1. **Срочность.** «Немедленно», «в течение 2 часов», «ваш аккаунт
        будет заблокирован» — злоумышленники не дают вам времени думать.


        2. **Страх.** Угрозы последствиями: блокировка, штраф, увольнение.
        Легитимные сервисы так не пишут.


        3. **Подозрительный отправитель.** Проверяйте домен: tehnoqroup ≠
        tehnogroup. Одна буква — и вы на поддельном сайте.


        4. **Необычная просьба.** Руководитель просит перевести деньги
        через мессенджер? Позвоните ему лично.


        5. **Ссылки и вложения.** Наведите курсор — реальный адрес ссылки
        может отличаться от видимого текста.


        При получении подозрительного письма: не открывайте вложения,
        перешлите на security@tehnogroup.ru, затем удалите.
